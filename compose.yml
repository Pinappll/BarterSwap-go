services:
  go:
    build: .
    tty: true
    stdin_open: true
    volumes:
      - .:/home/go/app
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - '8080:8080'

  db:
    image: postgres:17-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
